<!-- 统一的管理后台侧边栏 -->
<div class="card sticky-top admin-sidebar-card">
    <div class="card-header bg-primary text-white">
        <h5 class="card-title mb-0">
            <i class="fas fa-cogs"></i> 管理面板
        </h5>
    </div>
    <div class="list-group list-group-flush">
        <!-- 仪表盘 -->
        <a href="{{ url_for('admin_dashboard') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center {{ 'active' if request.endpoint in ['admin_dashboard'] }}">
            <i class="fas fa-tachometer-alt me-2"></i>
            <span>控制面板</span>
        </a>
        
        <!-- 分组标题：内容管理 -->
        <div class="list-group-item bg-light py-2 admin-sidebar-header">
            <small class="text-muted fw-bold text-uppercase">内容管理</small>
        </div>
        
        <a href="{{ url_for('admin_categories') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center {{ 'active' if request.endpoint in ['admin_categories', 'admin_new_category', 'admin_edit_category'] }}">
            <i class="fas fa-tags me-2 text-success"></i>
            <span>器官分类</span>
        </a>
        
        <a href="{{ url_for('admin_modalities') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center {{ 'active' if request.endpoint in ['admin_modalities', 'admin_new_modality', 'admin_edit_modality'] }}">
            <i class="fas fa-microscope me-2 text-info"></i>
            <span>模态类型</span>
        </a>
        
        <a href="{{ url_for('admin_task_types') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center {{ 'active' if request.endpoint in ['admin_task_types', 'admin_new_task_type', 'admin_edit_task_type'] }}">
            <i class="fas fa-tasks me-2 text-warning"></i>
            <span>任务类型</span>
        </a>
        
        <!-- 分组标题：用户管理 -->
        <div class="list-group-item bg-light py-2 admin-sidebar-header">
            <small class="text-muted fw-bold text-uppercase">用户管理</small>
        </div>
        
        <a href="{{ url_for('user_admin.list_users') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center {{ 'active' if request.endpoint and request.endpoint.startswith('user_admin.') }}">
            <i class="fas fa-users me-2" style="color: #6f42c1;"></i>
            <span>用户管理</span>
        </a>
        
        <!-- 分组标题：知识星球管理 -->
        <div class="list-group-item bg-light py-2 admin-sidebar-header">
            <small class="text-muted fw-bold text-uppercase">知识星球管理</small>
        </div>
        
        <a href="{{ url_for('planet.admin_list_applications') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center {{ 'active' if request.endpoint == 'planet.admin_list_applications' }}">
            <i class="fas fa-star me-2 text-warning"></i>
            <span>权限申请</span>
            {% if unread_notifications_count > 0 %}
            <span class="badge bg-danger ms-auto unread-count-badge" data-unread-count>{{ unread_notifications_count }}</span>
            {% endif %}
        </a>
        
        <!-- 暂时隐藏通知消息模块，避免与权限申请功能重复，保留代码以便未来复用
        <a href="{{ url_for('planet.admin_notifications') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center {{ 'active' if request.endpoint == 'planet.admin_notifications' }}">
            <i class="fas fa-bell me-2 text-primary"></i>
            <span>通知消息</span>
            {% if unread_notifications_count > 0 %}
            <span class="badge bg-danger ms-auto unread-count-badge" data-unread-count>{{ unread_notifications_count }}</span>
            {% endif %}
        </a>
        -->
        
        <!-- 分组标题：系统功能 -->
        <div class="list-group-item bg-light py-2 admin-sidebar-header">
            <small class="text-muted fw-bold text-uppercase">数据集管理</small>
        </div>
        
        <a href="{{ url_for('admin_datasets') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center {{ 'active' if request.endpoint == 'admin_datasets' }}">
            <i class="fas fa-database me-2 text-primary"></i>
            <span>管理数据集</span>
        </a>
        
        <a href="{{ url_for('new_dataset') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center">
            <i class="fas fa-plus me-2 text-success"></i>
            <span>新建数据集</span>
        </a>
        
        <a href="{{ url_for('upload_markdown') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center">
            <i class="fas fa-file-upload me-2 text-info"></i>
            <span>上传数据集</span>
        </a>
        
        <a href="{{ url_for('batch_upload_markdown') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center">
            <i class="fas fa-layer-group me-2 text-primary"></i>
            <span>批量上传</span>
        </a>
        
        <!-- 系统操作 -->
        <div class="list-group-item bg-light py-2 admin-sidebar-header">
            <small class="text-muted fw-bold text-uppercase">系统操作</small>
        </div>
        
        <a href="{{ url_for('index') }}" 
           class="list-group-item list-group-item-action d-flex align-items-center">
            <i class="fas fa-home me-2 text-dark"></i>
            <span>返回首页</span>
        </a>
    </div>
</div>
